<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CEO Research Agent</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --border: #252a38;
    --accent: #4f8ef7;
    --accent2: #7c3aed;
    --text: #e8eaf0;
    --muted: #6b7280;
    --success: #22c55e;
    --error: #ef4444;
    --radius: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeDown .5s ease both;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(79,142,247,.12);
    border: 1px solid rgba(79,142,247,.25);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 999px;
    margin-bottom: 16px;
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 6vw, 42px);
    line-height: 1.15;
    background: linear-gradient(135deg, #e8eaf0 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-top: 8px;
    font-weight: 300;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
    width: 100%;
    max-width: 540px;
    animation: fadeUp .5s .1s ease both;
  }

  .field { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
  }
  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  button#runBtn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 14px;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity .2s, transform .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  button#runBtn:hover { opacity: .9; transform: translateY(-1px); }
  button#runBtn:active { transform: translateY(0); }
  button#runBtn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  /* ── Status ── */
  #statusBox {
    display: none;
    margin-top: 20px;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.6;
  }
  #statusBox.running {
    background: rgba(79,142,247,.08);
    border: 1px solid rgba(79,142,247,.2);
    color: var(--accent);
  }
  #statusBox.error {
    background: rgba(239,68,68,.08);
    border: 1px solid rgba(239,68,68,.2);
    color: var(--error);
  }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(79,142,247,.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    display: inline-block;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  /* ── Steps log ── */
  #stepsLog {
    display: none;
    margin-top: 8px;
    max-height: 130px;
    overflow-y: auto;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
  }
  #stepsLog .step { padding: 1px 0; }

  /* ── Result ── */
  #resultCard {
    display: none;
    width: 100%;
    max-width: 540px;
    margin-top: 20px;
    animation: fadeUp .4s ease both;
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .result-name { font-family: 'DM Serif Display', serif; font-size: 22px; }
  .result-role { color: var(--muted); font-size: 13px; margin-top: 2px; }

  .section { margin-bottom: 20px; }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .summary-text {
    font-size: 14px;
    line-height: 1.7;
    color: #c9ccd6;
  }

  .tag-list { display: flex; flex-wrap: wrap; gap: 7px; }
  .tag {
    background: rgba(79,142,247,.1);
    border: 1px solid rgba(79,142,247,.2);
    color: #93b8fc;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 999px;
  }

  .list-items { list-style: none; }
  .list-items li {
    font-size: 13px;
    color: #c9ccd6;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .list-items li:last-child { border-bottom: none; }
  .list-items li::before { content: '→'; color: var(--accent); flex-shrink: 0; }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .meta-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
  }
  .meta-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .meta-value { font-size: 20px; font-weight: 600; color: var(--accent); margin-top: 4px; }

  .download-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 12px;
    cursor: pointer;
    margin-top: 4px;
    transition: border-color .2s, background .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .download-btn:hover { border-color: var(--accent); background: rgba(79,142,247,.06); }

  /* ── Animations ── */
  @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:none; } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(16px);  } to { opacity:1; transform:none; } }
  @keyframes spin     { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="badge">🤖 AI Agent</div>
  <h1>CEO Research Agent</h1>
  <p class="subtitle">Autonomous web research </p>
</header>

<!-- Input Card -->
<div class="card">
  <div class="field">
    <label>CEO / Founder Name *</label>
    <input id="nameInput" type="text" placeholder="e.g. Sam Altman" autocomplete="off"/>
  </div>
  <div class="field">
    <label>Company <span style="color:var(--muted);font-size:10px;text-transform:none;">(optional)</span></label>
    <input id="companyInput" type="text" placeholder="e.g. OpenAI" autocomplete="off"/>
  </div>
  <button id="runBtn" onclick="startResearch()">
    <span>🔍</span> Research Now
  </button>

  <div id="statusBox">
    <div id="statusText"></div>
    <div id="stepsLog"></div>
  </div>
</div>

<!-- Result Card -->
<div class="card" id="resultCard">
  <div class="result-header">
    <div class="avatar" id="resAvatar">👤</div>
    <div>
      <div class="result-name" id="resName">—</div>
      <div class="result-role" id="resRole">—</div>
    </div>
  </div>

  <div class="section" id="secSummary">
    <div class="section-title">Summary</div>
    <p class="summary-text" id="resSummary"></p>
  </div>

  <div class="section" id="secAchievements">
    <div class="section-title">Key Achievements</div>
    <ul class="list-items" id="resAchievements"></ul>
  </div>

  <div class="section" id="secCareer">
    <div class="section-title">Career Timeline</div>
    <ul class="list-items" id="resCareer"></ul>
  </div>

  <div class="section" id="secNews">
    <div class="section-title">Recent News</div>
    <ul class="list-items" id="resNews"></ul>
  </div>

  <div class="section" id="secEducation">
    <div class="section-title">Education</div>
    <div class="tag-list" id="resEducation"></div>
  </div>

  <div class="section">
    <div class="section-title">Agent Stats</div>
    <div class="meta-grid">
      <div class="meta-item">
        <div class="meta-label">Memory Steps</div>
        <div class="meta-value" id="resSteps">—</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Sources Scraped</div>
        <div class="meta-value" id="resSources">—</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Queries Used</div>
        <div class="meta-value" id="resQueries">—</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Nationality</div>
        <div class="meta-value" style="font-size:14px;margin-top:6px;" id="resNationality">—</div>
      </div>
    </div>
  </div>

  <button class="download-btn" id="downloadBtn">⬇️ Download Full JSON Report</button>
</div>

<script>
let currentJobId = null;
let pollInterval = null;
let fullReport = null;

const phases = [
  "🧠 Planning research strategy...",
  "🌐 Browsing the web...",
  "🔬 Extracting facts with AI...",
  "🔄 Gap-filling follow-up searches...",
  "📊 Synthesizing final report..."
];
let phaseIndex = 0;
let phaseInterval = null;

function startResearch() {
  const name = document.getElementById('nameInput').value.trim();
  const company = document.getElementById('companyInput').value.trim();
  if (!name) { alert('Please enter a CEO or founder name.'); return; }

  // Reset UI
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('runBtn').disabled = true;
  showStatus('running', `<span class="spinner"></span> Starting research on <strong>${name}</strong>...`);
  document.getElementById('stepsLog').style.display = 'block';
  document.getElementById('stepsLog').innerHTML = '';
  phaseIndex = 0;

  // Animate phases
  phaseInterval = setInterval(() => {
    if (phaseIndex < phases.length) {
      addStep(phases[phaseIndex]);
      phaseIndex++;
    }
  }, 8000);

  fetch('/api/research', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, company })
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) { showError(data.error); return; }
    currentJobId = data.job_id;
    pollInterval = setInterval(checkStatus, 3000);
  })
  .catch(e => showError(e.message));
}

function checkStatus() {
  if (!currentJobId) return;
  fetch(`/api/status/${currentJobId}`)
    .then(r => r.json())
    .then(data => {
      if (data.status === 'done') {
        clearInterval(pollInterval);
        clearInterval(phaseInterval);
        addStep('✅ Research complete!');
        setTimeout(() => {
          document.getElementById('statusBox').style.display = 'none';
          showResult(data.result);
        }, 800);
        document.getElementById('runBtn').disabled = false;
      } else if (data.status === 'error') {
        clearInterval(pollInterval);
        clearInterval(phaseInterval);
        showError(data.error || 'Unknown error occurred');
        document.getElementById('runBtn').disabled = false;
      }
    })
    .catch(e => showError(e.message));
}

function showResult(report) {
  fullReport = report;
  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('resName').textContent = report.name || 'Unknown';
  document.getElementById('resRole').textContent =
    [report.current_role, report.current_company].filter(Boolean).join(' @ ') || '—';
  document.getElementById('resSummary').textContent = report.summary || 'No summary available.';
  document.getElementById('resSteps').textContent = report.memory_steps || '—';
  document.getElementById('resSources').textContent = (report.sources || []).length;
  document.getElementById('resQueries').textContent = (report.search_queries_used || []).length;
  document.getElementById('resNationality').textContent = report.nationality || '—';

  fillList('resAchievements', report.key_achievements, 'secAchievements');
  fillList('resCareer', report.career_timeline, 'secCareer');
  fillList('resNews', report.recent_news, 'secNews');

  const eduEl = document.getElementById('resEducation');
  const edu = report.education || [];
  if (edu.length) {
    eduEl.innerHTML = edu.map(e => `<span class="tag">${e}</span>`).join('');
    document.getElementById('secEducation').style.display = 'block';
  } else {
    document.getElementById('secEducation').style.display = 'none';
  }

  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
}

function fillList(elId, items, secId) {
  const el = document.getElementById(elId);
  const sec = document.getElementById(secId);
  if (items && items.length) {
    el.innerHTML = items.slice(0, 6).map(i => `<li>${i}</li>`).join('');
    sec.style.display = 'block';
  } else {
    sec.style.display = 'none';
  }
}

function showStatus(type, html) {
  const box = document.getElementById('statusBox');
  box.style.display = 'block';
  box.className = type;
  document.getElementById('statusText').innerHTML = html;
}

function showError(msg) {
  document.getElementById('stepsLog').style.display = 'none';
  showStatus('error', `❌ Error: ${msg}`);
  document.getElementById('runBtn').disabled = false;
}

function addStep(text) {
  const log = document.getElementById('stepsLog');
  const div = document.createElement('div');
  div.className = 'step';
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

document.getElementById('downloadBtn').addEventListener('click', () => {
  if (!fullReport) return;
  const blob = new Blob([JSON.stringify(fullReport, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${(fullReport.name || 'report').replace(/\s+/g, '_')}_report.json`;
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startResearch();
});
</script>
</body>
</html>
