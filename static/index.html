<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CEO Research Agent</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    .section {
      margin-top: 20px;
    }

    .section-title {
      font-size: 12px;
      color: #3b82f6;
      letter-spacing: 1px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tag {
      background: #1e293b;
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 14px;
    }

    .line-item {
      margin: 8px 0;
    }

    input, button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-right: 10px;
    }

    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- INPUT -->
    <div class="section">
      <input type="text" id="nameInput" placeholder="Enter CEO name"/>
      <button onclick="fetchData()">Search</button>
    </div>

    <!-- RESULTS -->
    <div id="results" style="display:none;">

      <!-- SUMMARY -->
      <div class="section">
        <div class="section-title">Summary</div>
        <div id="resSummary"></div>
      </div>

      <!-- CAREER -->
      <div class="section">
        <div class="section-title">Career Timeline</div>
        <div id="resCareer"></div>
      </div>

      <!-- NEWS -->
      <div class="section">
        <div class="section-title">Recent News</div>
        <div id="resNews"></div>
      </div>

      <!-- EDUCATION -->
      <div class="section">
        <div class="section-title">Education</div>
        <div class="tag-list" id="resEducation"></div>
      </div>

      <!-- ✅ NATIONALITY (NEW STYLE) -->
      <div class="section">
        <div class="section-title">Nationality</div>
        <div class="tag-list" id="resNationality"></div>
      </div>

    </div>
  </div>

  <script>
    async function fetchData() {
      const name = document.getElementById("nameInput").value;

      const res = await fetch(`/api/research?name=${name}`);
      const data = await res.json();

      document.getElementById("results").style.display = "block";

      // Summary
      document.getElementById("resSummary").textContent = data.summary || "—";

      // Career
      const careerDiv = document.getElementById("resCareer");
      careerDiv.innerHTML = "";
      (data.career || []).forEach(item => {
        const div = document.createElement("div");
        div.className = "line-item";
        div.textContent = "→ " + item;
        careerDiv.appendChild(div);
      });

      // News
      const newsDiv = document.getElementById("resNews");
      newsDiv.innerHTML = "";
      (data.news || []).forEach(item => {
        const div = document.createElement("div");
        div.className = "line-item";
        div.textContent = "→ " + item;
        newsDiv.appendChild(div);
      });

      // Education
      const eduDiv = document.getElementById("resEducation");
      eduDiv.innerHTML = "";
      (data.education || []).forEach(item => {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = item;
        eduDiv.appendChild(span);
      });

      //  Nationality 
      const natDiv = document.getElementById("resNationality");
      natDiv.innerHTML = "";
      if (data.nationality) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = data.nationality;
        natDiv.appendChild(span);
      }
    }
  </script>
</body>
</html>
